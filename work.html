<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Работа — WTS Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --black: #020604;
  --deep: #030a05;
  --dark: #071209;
  --panel: rgba(5, 18, 8, 0.85);
  --glass: rgba(10, 30, 14, 0.55);
  --glass2: rgba(4, 20, 8, 0.72);
  --emerald: #00e87a;
  --emerald2: #00c45e;
  --emerald3: #00ff8a;
  --teal: #00b894;
  --dim: rgba(0, 232, 122, 0.12);
  --dim2: rgba(0, 232, 122, 0.07);
  --glow: 0 0 20px rgba(0, 232, 122, 0.4), 0 0 60px rgba(0, 232, 122, 0.15);
  --glow2: 0 0 10px rgba(0, 232, 122, 0.5), 0 0 30px rgba(0, 232, 122, 0.2);
  --border: rgba(0, 232, 122, 0.2);
  --border2: rgba(0, 232, 122, 0.1);
  --text: #c8ffe0;
  --text2: rgba(200, 255, 224, 0.6);
  --text3: rgba(200, 255, 224, 0.35);
  --font-display: 'Orbitron', monospace;
  --font-body: 'Rajdhani', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --r: 18px;
  --status-open: #00e87a;
  --status-work: #f0c000;
  --status-closed: rgba(200,255,224,0.25);
}

html, body {
  width: 100%; height: 100%;
  background: var(--black);
  color: var(--text);
  font-family: var(--font-body);
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--emerald2); border-radius: 2px; }

/* ══ CANVAS ══ */
#particle-canvas {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}

/* ══ BG LAYERS ══ */
.grid-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(0,232,122,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,232,122,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridDrift 20s linear infinite;
}
@keyframes gridDrift { from { transform: translateY(0); } to { transform: translateY(40px); } }

.splash-fog {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 40% at 50% 60%, rgba(0,232,122,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 30% 50%, rgba(0,180,80,0.03) 0%, transparent 60%);
  animation: fogPulse 6s ease-in-out infinite alternate;
}
@keyframes fogPulse { from { opacity: 0.6; } to { opacity: 1; } }

.deco-lines { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
.deco-line {
  position: absolute;
  background: linear-gradient(90deg, transparent, rgba(0,232,122,0.08), transparent);
  height: 1px; animation: decoScroll 8s linear infinite;
}
.deco-line:nth-child(1) { width: 60%; top: 25%; }
.deco-line:nth-child(2) { width: 40%; top: 55%; animation-delay: -3s; left: 30%; }
.deco-line:nth-child(3) { width: 30%; top: 78%; animation-delay: -6s; left: 10%; }
@keyframes decoScroll { from { transform: translateX(-100%); } to { transform: translateX(200%); } }

/* ══ RIPPLE ══ */
.ripple {
  position: absolute; border-radius: 50%;
  background: rgba(0,232,122,0.18); transform: scale(0);
  animation: rippleOut 0.55s linear; pointer-events: none;
}
@keyframes rippleOut { to { transform: scale(4); opacity: 0; } }

/* ══════════════ PAGE SHELL ══════════════ */
.page {
  position: relative; z-index: 5;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ══ TOPBAR ══ */
.topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 52px 16px 14px;
  flex-shrink: 0;
}

.back-btn, .icon-btn {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--glass);
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: all 0.3s ease; position: relative; overflow: hidden;
}
.back-btn:active, .icon-btn:active {
  transform: scale(0.88);
  background: rgba(0,232,122,0.1);
  border-color: var(--emerald2);
  box-shadow: var(--glow2);
}

.topbar-center {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
}
.topbar-wts {
  font-family: var(--font-display);
  font-size: 20px; font-weight: 900; letter-spacing: 7px;
  color: var(--emerald3); text-shadow: var(--glow);
  animation: titleGlow 3s ease-in-out infinite alternate;
}
@keyframes titleGlow {
  from { text-shadow: 0 0 20px rgba(0,232,122,0.6), 0 0 60px rgba(0,232,122,0.2); }
  to   { text-shadow: 0 0 30px rgba(0,232,122,0.9), 0 0 80px rgba(0,232,122,0.4); }
}
.topbar-sub {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 3px;
  color: var(--text3); text-transform: uppercase; margin-top: 2px;
}

.topbar-actions { display: flex; gap: 8px; }

.add-btn {
  height: 40px; padding: 0 14px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(0,232,122,0.15), rgba(0,180,80,0.08));
  border: 1px solid var(--emerald2);
  color: var(--emerald3);
  font-family: var(--font-display); font-size: 9px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; white-space: nowrap;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 0 16px rgba(0,232,122,0.15);
  transition: all 0.3s ease; position: relative; overflow: hidden;
  display: flex; align-items: center; gap: 6px;
}
.add-btn:active {
  transform: scale(0.93);
  box-shadow: 0 0 28px rgba(0,232,122,0.35);
}
.add-btn-plus {
  font-size: 16px; font-weight: 400; line-height: 1; margin-bottom: 1px;
}

/* ══ SEARCH BAR ══ */
.search-wrap {
  padding: 0 16px 14px; flex-shrink: 0; position: relative;
}
.search-input {
  width: 100%; height: 40px;
  background: var(--glass2);
  border: 1px solid var(--border2);
  border-radius: 12px; padding: 0 14px 0 40px;
  font-family: var(--font-mono); font-size: 12px; letter-spacing: 1px;
  color: var(--text); outline: none;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  transition: all 0.3s ease;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus {
  border-color: rgba(0,232,122,0.3);
  box-shadow: 0 0 16px rgba(0,232,122,0.1);
}
.search-icon {
  position: absolute; left: 28px; top: 50%; transform: translateY(-50%);
  pointer-events: none;
}

/* ══ SECTION LABEL ══ */
.section-label {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 3px;
  color: var(--text3); text-transform: uppercase;
  padding: 0 16px; margin-bottom: 12px; flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}

/* ══ SCROLLABLE MAIN AREA ══ */
.main-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding-bottom: 24px;
}

/* ══ CATEGORY GRID ══ */
.cat-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 8px; padding: 0 16px;
}

.cat-card {
  aspect-ratio: 1;
  background: var(--glass2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px;
  cursor: pointer; position: relative; overflow: hidden;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 0 0 1px rgba(0,232,122,0.03) inset, 0 4px 16px rgba(0,0,0,0.4);
  user-select: none;
  opacity: 0; transform: translateY(14px);
  animation: catIn 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
}
.cat-card:nth-child(1)  { animation-delay: 0.04s; }
.cat-card:nth-child(2)  { animation-delay: 0.08s; }
.cat-card:nth-child(3)  { animation-delay: 0.12s; }
.cat-card:nth-child(4)  { animation-delay: 0.16s; }
.cat-card:nth-child(5)  { animation-delay: 0.20s; }
.cat-card:nth-child(6)  { animation-delay: 0.24s; }
.cat-card:nth-child(7)  { animation-delay: 0.28s; }
.cat-card:nth-child(8)  { animation-delay: 0.32s; }
.cat-card:nth-child(9)  { animation-delay: 0.36s; }
.cat-card:nth-child(10) { animation-delay: 0.40s; }

@keyframes catIn { to { opacity: 1; transform: translateY(0); } }

.cat-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(0,232,122,0.1) 0%, transparent 70%);
  opacity: 0; transition: opacity 0.3s;
}
.cat-card.active::before, .cat-card:active::before { opacity: 1; }

.cat-card.active {
  border-color: rgba(0,232,122,0.4);
  background: rgba(0,232,122,0.09);
  box-shadow: 0 0 18px rgba(0,232,122,0.18), 0 0 0 1px rgba(0,232,122,0.15) inset;
}
.cat-card:active { transform: scale(0.9); }

.cat-icon {
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  filter: drop-shadow(0 0 5px rgba(0,232,122,0.35));
  transition: filter 0.3s;
}
.cat-card.active .cat-icon { filter: drop-shadow(0 0 8px rgba(0,232,122,0.75)); }

.cat-name {
  font-family: var(--font-display); font-size: 6.5px; font-weight: 600;
  letter-spacing: 0.8px; color: var(--text3); text-align: center;
  text-transform: uppercase; line-height: 1.2;
  transition: color 0.3s; padding: 0 2px;
}
.cat-card.active .cat-name { color: var(--emerald); }

/* ══ LISTINGS PANEL ══ */
.listings-panel {
  margin-top: 20px; position: relative;
}
.listings-panel.hidden { display: none; }

.listings-label {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 3px;
  color: var(--text3); text-transform: uppercase;
  padding: 0 16px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.listings-label::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}
.listings-cat-name {
  color: var(--emerald); font-size: 9px; letter-spacing: 2px;
}

/* ── Horizontal swipe slider ── */
.slider-track-wrap {
  overflow: hidden; position: relative;
}
.slider-track {
  display: flex; gap: 12px;
  padding: 4px 16px 16px;
  overflow-x: auto; overflow-y: visible;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  cursor: grab;
}
.slider-track::-webkit-scrollbar { display: none; }
.slider-track.grabbing { cursor: grabbing; }

/* fade edges */
.slider-track-wrap::before,
.slider-track-wrap::after {
  content: ''; position: absolute; top: 0; bottom: 16px; width: 20px; z-index: 2;
  pointer-events: none;
}
.slider-track-wrap::before {
  left: 0;
  background: linear-gradient(90deg, var(--black), transparent);
}
.slider-track-wrap::after {
  right: 0;
  background: linear-gradient(-90deg, var(--black), transparent);
}

/* ── Listing card ── */
.listing-card {
  flex: 0 0 300px; scroll-snap-align: start;
  background: var(--glass2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 20px;
  position: relative; overflow: hidden;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 0 0 1px rgba(0,232,122,0.04) inset, 0 12px 32px rgba(0,0,0,0.5);
  transition: border-color 0.3s, box-shadow 0.3s;
  display: flex; flex-direction: column; gap: 12px;
  opacity: 0; transform: translateX(20px);
  animation: cardSlideIn 0.4s cubic-bezier(0.4,0,0.2,1) forwards;
}
.listing-card:hover {
  border-color: rgba(0,232,122,0.22);
  box-shadow: 0 0 24px rgba(0,232,122,0.08), 0 12px 32px rgba(0,0,0,0.5);
}

.listing-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,232,122,0.07) 0%, transparent 60%);
  pointer-events: none;
}

@keyframes cardSlideIn { to { opacity: 1; transform: translateX(0); } }
.listing-card:nth-child(1) { animation-delay: 0.05s; }
.listing-card:nth-child(2) { animation-delay: 0.12s; }
.listing-card:nth-child(3) { animation-delay: 0.19s; }
.listing-card:nth-child(4) { animation-delay: 0.26s; }

/* status badge */
.listing-status {
  position: absolute; top: 16px; right: 16px;
  padding: 4px 10px; border-radius: 20px;
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 1.5px;
  text-transform: uppercase; font-weight: 700;
}
.listing-status.open {
  background: rgba(0,232,122,0.12); border: 1px solid rgba(0,232,122,0.3);
  color: var(--emerald); box-shadow: 0 0 10px rgba(0,232,122,0.15);
}
.listing-status.inwork {
  background: rgba(240,192,0,0.1); border: 1px solid rgba(240,192,0,0.3);
  color: #f0c000; box-shadow: 0 0 10px rgba(240,192,0,0.1);
}
.listing-status.closed {
  background: rgba(200,255,224,0.05); border: 1px solid rgba(200,255,224,0.12);
  color: var(--text3);
}

.listing-title {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  letter-spacing: 0.5px; color: var(--text); line-height: 1.35;
  padding-right: 64px;
}

.listing-desc {
  font-size: 12px; line-height: 1.7; color: var(--text2);
}

.listing-fields { display: flex; flex-direction: column; gap: 6px; }
.listing-field {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 10px;
  background: rgba(0,232,122,0.03); border: 1px solid var(--border2);
  border-radius: 10px;
}
.listing-field-key {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px;
  color: var(--text3); text-transform: uppercase; flex-shrink: 0;
  padding-top: 1px; min-width: 52px;
}
.listing-field-val {
  font-family: var(--font-body); font-size: 13px; color: var(--text2);
  font-weight: 500; line-height: 1.4;
}
.listing-field-val.amount {
  font-family: var(--font-display); font-size: 14px; font-weight: 700;
  color: var(--emerald); text-shadow: 0 0 10px rgba(0,232,122,0.4);
}

.listing-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}

.btn-details {
  width: 100%; padding: 12px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(0,232,122,0.12), rgba(0,180,80,0.06));
  border: 1px solid rgba(0,232,122,0.22);
  color: var(--emerald3);
  font-family: var(--font-display); font-size: 10px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; position: relative; overflow: hidden;
  transition: all 0.3s ease;
  box-shadow: 0 0 12px rgba(0,232,122,0.1);
  margin-top: auto;
}
.btn-details:active {
  transform: scale(0.96);
  box-shadow: 0 0 24px rgba(0,232,122,0.25);
}

/* scroll dots */
.slider-dots {
  display: flex; justify-content: center; gap: 6px;
  padding: 0 16px 4px;
}
.slider-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--border2); transition: all 0.3s ease;
}
.slider-dot.active {
  background: var(--emerald); width: 16px; border-radius: 3px;
  box-shadow: 0 0 6px var(--emerald);
}

/* skeleton loading */
.skeleton {
  background: linear-gradient(90deg,
    rgba(0,232,122,0.04) 25%, rgba(0,232,122,0.09) 50%, rgba(0,232,122,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: 8px;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* ══════════════ MODAL ══════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(2,6,4,0.7);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open {
  opacity: 1; pointer-events: all;
}
.modal-sheet {
  width: 100%; max-height: 90vh;
  background: linear-gradient(180deg, #051409 0%, var(--deep) 100%);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 24px 24px 0 0;
  overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 -8px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,232,122,0.06) inset;
  transform: translateY(100%);
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }

.modal-handle {
  width: 40px; height: 4px; border-radius: 2px;
  background: var(--border2); margin: 14px auto 0;
  flex-shrink: 0;
}

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; flex-shrink: 0;
}
.modal-title {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  letter-spacing: 2px; color: var(--emerald3);
  text-shadow: 0 0 12px rgba(0,232,122,0.4);
}
.modal-close {
  width: 32px; height: 32px; border-radius: 10px;
  background: rgba(0,232,122,0.06); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden;
}
.modal-close:active { transform: scale(0.88); background: rgba(0,232,122,0.12); }

.modal-divider {
  height: 1px; margin: 0 20px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  flex-shrink: 0;
}

.modal-scroll {
  flex: 1; overflow-y: auto; padding: 16px 20px 32px;
}

/* form fields */
.form-group { margin-bottom: 14px; }
.form-label {
  font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px;
  color: var(--text3); text-transform: uppercase; margin-bottom: 7px;
  display: block;
}
.form-input, .form-textarea {
  width: 100%;
  background: var(--glass2); border: 1px solid var(--border2);
  border-radius: 12px; padding: 12px 14px;
  font-family: var(--font-body); font-size: 14px; color: var(--text);
  outline: none; resize: none;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
  -webkit-appearance: none;
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text3); }
.form-input:focus, .form-textarea:focus {
  border-color: rgba(0,232,122,0.3);
  box-shadow: 0 0 16px rgba(0,232,122,0.08), 0 0 0 1px rgba(0,232,122,0.1) inset;
  background: rgba(4,22,10,0.8);
}
.form-textarea { min-height: 80px; line-height: 1.6; }

/* custom fields */
.custom-fields-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

.custom-field-block {
  background: rgba(0,20,8,0.6);
  border: 1px solid var(--border2); border-radius: 14px;
  padding: 14px; position: relative;
  animation: cfIn 0.3s cubic-bezier(0.4,0,0.2,1);
}
@keyframes cfIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.custom-field-row { display: flex; gap: 8px; margin-bottom: 8px; }
.custom-field-row .form-input { flex: 1; }

.cf-remove {
  width: 36px; height: 40px; flex-shrink: 0;
  background: rgba(255,60,60,0.08); border: 1px solid rgba(255,60,60,0.2);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.25s ease;
}
.cf-remove:active { background: rgba(255,60,60,0.18); transform: scale(0.9); }

.btn-add-field {
  width: 100%; padding: 12px;
  border-radius: 12px;
  background: rgba(0,232,122,0.04); border: 1px dashed rgba(0,232,122,0.2);
  color: var(--text3); font-family: var(--font-mono); font-size: 11px;
  letter-spacing: 2px; cursor: pointer;
  transition: all 0.3s ease; display: flex; align-items: center;
  justify-content: center; gap: 8px; margin-bottom: 20px;
}
.btn-add-field:active {
  background: rgba(0,232,122,0.08); border-color: rgba(0,232,122,0.35);
  color: var(--emerald);
}

.btn-submit {
  width: 100%; padding: 16px;
  border-radius: 14px;

// ══════════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════════
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');
let particles = [], W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
function Particle() {
  this.x = Math.random()*W; this.y = Math.random()*H;
  this.vx = (Math.random()-0.5)*0.3; this.vy = -Math.random()*0.5-0.1;
  this.r = Math.random()*1.5+0.3; this.alpha = Math.random()*0.5+0.1;
  this.life = 1; this.decay = Math.random()*0.003+0.001;
}
for (let i=0;i<60;i++) particles.push(new Particle());
(function anim() {
  ctx.clearRect(0,0,W,H);
  particles.forEach((p,i)=>{
    p.x+=p.vx; p.y+=p.vy; p.life-=p.decay;
    if(p.life<=0||p.y<-10) particles[i]=new Particle();
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,232,122,${p.alpha*p.life})`; ctx.fill();
  });
  if(Math.random()<0.02){
    const lx=Math.random()*W,ly=Math.random()*H;
    ctx.beginPath(); ctx.moveTo(lx,ly);
    ctx.lineTo(lx+Math.random()*80-40,ly+Math.random()*4-2);
    ctx.strokeStyle=`rgba(0,232,122,${Math.random()*0.06+0.02})`;
    ctx.lineWidth=0.5; ctx.stroke();
  }
  requestAnimationFrame(anim);
})();

// ══════════════════════════════════════════
// RIPPLE
// ══════════════════════════════════════════
function ripple(el, e) {
  const r = document.createElement('div'); r.className='ripple';
  const rect = el.getBoundingClientRect();
  const x=(e.clientX||rect.left+rect.width/2)-rect.left;
  const y=(e.clientY||rect.top+rect.height/2)-rect.top;
  const sz=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${sz}px;height:${sz}px;left:${x-sz/2}px;top:${y-sz/2}px`;
  el.appendChild(r); setTimeout(()=>r.remove(),600);
}

// ══════════════════════════════════════════

const ICONS = {

// ══════════════════════════════════════════
// BUILD CATEGORY GRID
// ══════════════════════════════════════════
let activeCategory = null;

const catGrid = document.getElementById('cat-grid');
CATEGORIES.forEach(cat => {
  const el = document.createElement('div');
  el.className = 'cat-card';
  el.dataset.id = cat.id;
  el.innerHTML = `<div class="cat-icon">${ICONS[cat.icon]||ICONS.other}</div><div class="cat-name">${cat.name}</div>`;
  el.addEventListener('click', e => {
    ripple(el, e);
    selectCategory(cat.id, el);
  });
  catGrid.appendChild(el);
});

function selectCategory(id, el) {
  document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
  if (activeCategory === id) {
    activeCategory = null;
    document.getElementById('listings-panel').classList.add('hidden');
    return;
  }
  activeCategory = id;
  el.classList.add('active');
  buildSlider(id);
  const panel = document.getElementById('listings-panel');
  panel.classList.remove('hidden');
  document.getElementById('listings-cat-name').textContent =
    CATEGORIES.find(c => c.id === id)?.name.replace('\n',' ') || '';
  setTimeout(() => panel.scrollIntoView({ behavior:'smooth', block:'nearest' }), 100);
}

// ══════════════════════════════════════════
// BUILD SLIDER
// ══════════════════════════════════════════
function buildSlider(catId) {
  const track = document.getElementById('slider-track');
  const dots  = document.getElementById('slider-dots');
  const items = LISTINGS[catId] || [];
  track.innerHTML = ''; dots.innerHTML = '';

  if (!items.length) {
    track.innerHTML = `<div style="flex:0 0 280px;padding:20px 0;display:flex;align-items:center;gap:10px">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="rgba(0,232,122,0.3)" stroke-width="1.4"/><path d="M12 8V12M12 16H12.01" stroke="rgba(0,232,122,0.5)" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span style="font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:1px">Нет объявлений в этой категории</span>
    </div>`;
    return;
  }

  const statusLabel = { open:'OPEN', inwork:'IN WORK', closed:'CLOSED' };

  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'listing-card';

    const extraHtml = item.extra.map(f =>
      `<div class="listing-field">
        <span class="listing-field-key">${f.key}</span>
        <span class="listing-field-val">${f.val}</span>
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="listing-status ${item.status}">${statusLabel[item.status]||item.status}</div>
      <div class="listing-title">${item.title}</div>
      <div class="listing-desc">${item.desc}</div>
      <div class="listing-fields">
        <div class="listing-field">
          <span class="listing-field-key">Цель</span>
          <span class="listing-field-val">${item.goal}</span>
        </div>
        <div class="listing-field">
          <span class="listing-field-key">Сумма</span>
          <span class="listing-field-val amount">${item.amount}</span>
        </div>
        <div class="listing-field">
          <span class="listing-field-key">Условия</span>
          <span class="listing-field-val">${item.conditions}</span>
        </div>
        <div class="listing-field">
          <span class="listing-field-key">Гарант</span>
          <span class="listing-field-val">${item.guarantor}</span>
        </div>
        ${extraHtml}
      </div>
      <div class="listing-divider"></div>
      <button class="btn-details" data-idx="${i}">Подробнее</button>`;

    card.querySelector('.btn-details').addEventListener('click', e => {
      ripple(e.currentTarget, e);
      openDetail(item);
    });

    track.appendChild(card);

    // dot
    const dot = document.createElement('div');
    dot.className = 'slider-dot' + (i===0?' active':'');
    dots.appendChild(dot);
  });

  // snap scroll → update dots
  let dotTimeout;
  track.addEventListener('scroll', () => {
    clearTimeout(dotTimeout);
    dotTimeout = setTimeout(() => {
      const cardW = track.querySelector('.listing-card')?.offsetWidth || 300;
      const idx = Math.round(track.scrollLeft / (cardW + 12));
      dots.querySelectorAll('.slider-dot').forEach((d, i) =>
        d.classList.toggle('active', i === idx)
      );
    }, 60);
  });

  // drag-to-scroll
  let isDown=false, startX, scrollL;
  track.addEventListener('mousedown', e => { isDown=true; track.classList.add('grabbing'); startX=e.pageX-track.offsetLeft; scrollL=track.scrollLeft; });
  track.addEventListener('mouseleave', ()=>{ isDown=false; track.classList.remove('grabbing'); });
  track.addEventListener('mouseup', ()=>{ isDown=false; track.classList.remove('grabbing'); });
  track.addEventListener('mousemove', e => {
    if(!isDown) return; e.preventDefault();
    const x=e.pageX-track.offsetLeft; track.scrollLeft=scrollL-(x-startX)*1.2;
  });
}

// ══════════════════════════════════════════
// DETAIL MODAL
// ══════════════════════════════════════════
function openDetail(item) {
  const overlay = document.getElementById('detail-overlay');
  const title   = document.getElementById('detail-title');
  const body    = document.getElementById('detail-body');
  const statusLabel = { open:'OPEN', inwork:'IN WORK', closed:'CLOSED' };

  title.textContent = item.title;

  const extraHtml = item.extra.map(f => `
    <div class="listing-field" style="margin-bottom:8px">
      <span class="listing-field-key">${f.key}</span>
      <span class="listing-field-val">${f.val}</span>
    </div>`).join('');

  body.innerHTML = `
    <div style="padding-top:16px">
      <span class="listing-status ${item.status}" style="position:static;display:inline-block;margin-bottom:16px">${statusLabel[item.status]}</span>
      <div style="font-size:13px;line-height:1.8;color:var(--text2);margin-bottom:18px">${item.desc}</div>
      <div style="height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin-bottom:18px"></div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div class="listing-field"><span class="listing-field-key">Цель</span><span class="listing-field-val">${item.goal}</span></div>
        <div class="listing-field"><span class="listing-field-key">Сумма</span><span class="listing-field-val amount">${item.amount}</span></div>
        <div class="listing-field"><span class="listing-field-key">Условия</span><span class="listing-field-val">${item.conditions}</span></div>
        <div class="listing-field"><span class="listing-field-key">Гарант</span><span class="listing-field-val">${item.guarantor}</span></div>
        ${extraHtml}
      </div>
      <button class="btn-details" style="margin-top:24px;cursor:pointer" onclick="closeDetail()">Закрыть</button>
    </div>`;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  const overlay = document.getElementById('detail-overlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('close-detail-btn').addEventListener('click', closeDetail);
document.getElementById('detail-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDetail();
});

// ══════════════════════════════════════════
// CREATE LISTING MODAL
// ══════════════════════════════════════════
const modalOverlay  = document.getElementById('modal-overlay');
const openModalBtn  = document.getElementById('open-modal-btn');
const closeModalBtn = document.getElementById('close-modal-btn');
const btnAddField   = document.getElementById('btn-add-field');
const customFields  = document.getElementById('custom-fields');

openModalBtn.addEventListener('click', e => {
  ripple(openModalBtn, e);
  modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
});

function closeModal() {
  modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
}
closeModalBtn.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if(e.target===modalOverlay) closeModal(); });

// add custom field
let cfCount = 0;
btnAddField.addEventListener('click', e => {
  ripple(btnAddField, e);
  cfCount++;
  const block = document.createElement('div');
  block.className = 'custom-field-block';
  block.dataset.cfid = cfCount;
  block.innerHTML = `
    <div class="custom-field-row">
      <input class="form-input" type="text" placeholder="Название поля…" data-role="key">
      <div class="cf-remove" data-remove="${cfCount}">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
          <path d="M1 1L11 11M11 1L1 11" stroke="rgba(255,80,80,0.6)" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <textarea class="form-textarea" style="min-height:60px" placeholder="Описание поля…" data-role="val"></textarea>`;
  block.querySelector('.cf-remove').addEventListener('click', () => {
    block.style.transition='all 0.25s ease';
    block.style.opacity='0'; block.style.transform='translateY(-6px)';
    setTimeout(()=>block.remove(), 250);
  });
  customFields.appendChild(block);
  setTimeout(()=>block.querySelector('input').focus(), 50);
});

// submit
document.getElementById('btn-submit').addEventListener('click', function(e) {
  ripple(this, e);
  this.textContent = '✓ Объявление выставлено';
  this.style.background = 'linear-gradient(135deg,rgba(0,232,122,0.25),rgba(0,180,80,0.15))';
  setTimeout(() => {
    this.textContent = 'Выставить объявление';
    this.style.background = '';
    closeModal();
  }, 1800);
});

// modal swipe down to close
let touchStartY=0;
const modalSheet = document.getElementById('modal-sheet');
modalSheet.addEventListener('touchstart', e=>{ touchStartY=e.touches[0].clientY; }, {passive:true});
modalSheet.addEventListener('touchmove', e=>{
  const dy=e.touches[0].clientY-touchStartY;
  if(dy>0) modalSheet.style.transform=`translateY(${dy}px)`;
}, {passive:true});
modalSheet.addEventListener('touchend', e=>{
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(dy>80){ closeModal(); } else { modalSheet.style.transform=''; }
});

// ══════════════════════════════════════════
// BACK BUTTON
// ══════════════════════════════════════════
document.getElementById('back-btn').addEventListener('click', function(e) {
  ripple(this, e);
  setTimeout(()=>{
    if(document.referrer&&document.referrer.includes(location.hostname)) history.back();
    else window.location.href='index.html';
  }, 200);
});

// ══════════════════════════════════════════
// SEARCH FILTER
// ══════════════════════════════════════════
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) return;
  // find matching category and listing
  let found = null, foundCatId = null;
  for (const [catId, items] of Object.entries(LISTINGS)) {
    const m = items.findIndex(it => it.title.toLowerCase().includes(q) || it.desc.toLowerCase().includes(q));
    if (m >= 0) { found = items[m]; foundCatId = catId; break; }
  }
  if (foundCatId) {
    const el = document.querySelector(`.cat-card[data-id="${foundCatId}"]`);
    if (el) { selectCategory(foundCatId, el); }
  }
});
</script>
